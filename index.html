function renderWhere(){let w=live.locations,h=live.locationHistory;return `<h2>Wie is waar?</h2><div class='card'><select id='whereLoc'>${WHERE_ORDER.map(x=>`<option ${w[my]?.location===x?'selected':''}>${x}</option>`).join('')}</select><input id='whereNote' placeholder='Notitie' value='${esc(w[my]?.note||'')}' style='margin-top:8px'><button class='btn primary' style='width:100%;margin-top:8px' onclick='saveWhere()'>Post locatie</button></div><div class='card'><h3>Huidig</h3>${Object.entries(w).length?Object.entries(w).map(([p,x])=>`<div class='line'><b>${esc(p)}</b><br>${esc(x.location)} ${x.note?'· '+esc(x.note):''}<br><span class='meta'>${new Date(x.updated_at).toLocaleString('nl-BE')}</span></div>`).join(''):'<div class="empty">Nog niets.</div>'}</div><div class='card'><h3>Historiek</h3>${h.length?h.map(x=>`<div class='line'><b>${esc(x.user_name)}</b> · ${esc(x.location)}<br><span class='meta'>${new Date(x.created_at).toLocaleString('nl-BE')}</span></div>`).join(''):'<div class="empty">Nog geen historiek.</div>'}</div>`}async function saveWhere(){await sb.from('locations').upsert({user_name:my,location:whereLoc.value,note:whereNote.value,updated_at:new Date().toISOString()});await sb.from('location_history').insert({user_name:my,location:whereLoc.value,note:whereNote.value});syncAll()}
function renderChat(){return `<h2>Chat</h2><div class='card'>${live.messages.length?live.messages.map(x=>`<div class='line'><b>${esc(x.user_name)}</b><p>${esc(x.message)}</p><span class='meta'>${new Date(x.created_at).toLocaleTimeString('nl-BE')}</span></div>`).join(''):'<div class="empty">Nog geen berichten.</div>'}</div><div class='row'><input id='msg' placeholder='Bericht'><button class='btn primary' onclick='sendMsg()'>Stuur</button></div>`}async function sendMsg(){let text=(msg.value||'').trim();if(!text)return;await sb.from('messages').insert({user_name:my,message:text});syncAll()}
const DRINKS={bier:['Bier',1.2],water:['Water',1],cola:['Cola',1],zero:['Cola Zero',1],half:['Bier 50cl',2.2],redbull:['Red Bull',1]};async function addOrder(type,delta){let d=DRINKS[type];await sb.from('pint_entries').insert({user_name:my,type,label:d[0],qty:delta,coins:d[1]*delta,euro:d[1]*COIN*delta});syncAll()}function orderTotals(){let by={};live.pints.forEach(x=>{by[x.type]??={label:x.label,qty:0,euro:0};by[x.type].qty+=+x.qty;by[x.type].euro+=+x.euro});return by}function renderOrder(){let by=orderTotals(),total=Object.values(by).reduce((s,x)=>s+x.euro,0);return `<h2>Drankbestelling</h2><div class='card'><h1>${money(total)}</h1><p>Huidige groepsbestelling</p>${Object.values(by).filter(x=>x.qty!==0).map(x=>`<div class='between line'><b>${x.label} · ${x.qty}</b><span class='amount'>${money(x.euro)}</span></div>`).join('')||'<div class="empty">Nog niets besteld.</div>'}</div><div class='card'><h3>Snel aanpassen</h3>${Object.keys(DRINKS).map(k=>`<div class='line row'><div style='flex:1'><b>${DRINKS[k][0]}</b><br><span class='meta'>${DRINKS[k][1]} coins</span></div><button class='btn secondary' onclick="addOrder('${k}',-1)">−</button><button class='btn primary' onclick="addOrder('${k}',1)">+</button></div>`).join('')}</div>`}
function renderLocker(){let l=live.locker||{locker_number:'',locker_code:'',locker_note:'Lockerzone 1 · net buiten het Festivalpark · vlak bij de hoofdingang · dagelijks open vanaf 11:50 tot 30 minuten na het laatste optreden'};return `<h2>Locker</h2><p class='intro'>Lockerzone 1 bevindt zich net buiten het Festivalpark, vlak bij de hoofdingang. Open elke dag vanaf 11:50 tot 30 minuten na het laatste optreden.</p><div class='card'><h2>Lockerzone 1</h2><p>${l.locker_number?'Lockernummer: '+esc(l.locker_number):'Lockernummer nog leeg'}<br>${l.locker_code?'Toegangscode: '+esc(l.locker_code):'Toegangscode nog leeg'}</p></div><div class='card'><label>Toegangscode locker</label><input id='lockerCode' value='${esc(l.locker_code||'')}'><label>Nummer van de locker zelf</label><input id='lockerNumber' value='${esc(l.locker_number||'')}'><label>Locatie/info</label><input id='lockerNote' value='${esc(l.locker_note||'Lockerzone 1 · net buiten het Festivalpark · vlak bij de hoofdingang · dagelijks open vanaf 11:50 tot 30 minuten na het laatste optreden')}'><button class='btn primary' style='width:100%;margin-top:8px' onclick='saveLocker()'>Opslaan</button><button class='btn secondary' style='width:100%;margin-top:8px' onclick='copyText(live.locker?.locker_code||"","Toegangscode gekopieerd")'>Kopieer toegangscode</button><button class='btn secondary' style='width:100%;margin-top:8px' onclick='copyText(live.locker?.locker_number||"","Lockernummer gekopieerd")'>Kopieer lockernummer</button></div>`}async function saveLocker(){await sb.from('locker').upsert({id:'main',locker_number:lockerNumber.value,locker_code:lockerCode.value,locker_note:lockerNote.value,updated_at:new Date().toISOString()});syncAll()}
function renderCard(){let d=live.card||{holder:'',note:'',updated_at:''};return `<h2>Groepskaart</h2><div class='card'><h1>${esc(d.holder||'Nog niemand')}</h1><span class='meta'>${d.updated_at?'Laatst: '+new Date(d.updated_at).toLocaleString('nl-BE'):''}</span></div><div class='card'><select id='cardPerson'><option value=''>Kies persoon</option>${PEOPLE.map(p=>`<option ${d.holder===p?'selected':''}>${p}</option>`).join('')}</select><input id='cardNote' placeholder='Notitie' value='${esc(d.note||'')}'><button class='btn primary' style='width:100%;margin-top:8px' onclick='saveCard()'>Opslaan</button></div>`}async function saveCard(){await sb.from('card_holder').upsert({id:'main',holder:cardPerson.value,note:cardNote.value,updated_at:new Date().toISOString()});syncAll()}
function renderCamp(){let c=CAMPING[campDay];return `<h2>Camping</h2><p class='intro'>DJ-line-up van The Hive + voetbal in Café De Welkom.</p><div class='pills'>${Object.keys(CAMPING).map(d=>`<button class='pill ${campDay===d?'active':''}' onclick="campDay='${d}';render()">${labels[d]}</button>`).join('')}</div><button class='btn secondary' onclick='openUrl(CAMPURL)'>Open camping/clashfinder</button>${Object.entries(c).map(([st,rows])=>`<div class='card'><h3>${st}</h3>${rows.length?slotRows(rows,st,campDay):'<div class="empty">Geen programma</div>'}</div>`).join('')}`}
function renderMap(){return `<h2>Map</h2><div class='card'><button class='btn primary' style='width:100%' onclick='openUrl("https://www.rockwerchter.be/en/news/app")'>Open officiële Rock Werchter app</button><button class='btn secondary' style='width:100%;margin-top:8px' onclick='openUrl("https://www.rockwerchter.be/en/info/how-to-get-there/map-of-the-surroundings")'>Open officiële omgevingskaart</button><p class='intro'>De interactieve festivalpark-map zit in de officiële app.</p></div>`}
function renderWK(){let rows=WC.map(m=>`<div class='line'><div class='between'><div><b>${m[2]} - ${m[3]}</b><br><span class='meta'>${m[0]} · ${m[1]} · ${m[5]}</span></div><span class='score'>${m[6]==='played'?m[4]:m[1]}</span></div></div>`).join('');return `<h2>WK voetbal</h2><p class='intro'>Alle 1/16 finales met uitslagen en komende wedstrijden tot vrijdag 10 juli.</p><div class='card'>${rows}</div>`}
function renderSpotify(){return `<h2>Spotify</h2><button class='btn primary' onclick='openUrl(SPOT[day])'>Open playlist van geselecteerde festivaldag</button>`}function renderPhotos(){return `<h2>Foto’s</h2><button class='btn primary' onclick='openUrl("https://photos.app.goo.gl/mSdQ9ZskizUY28zU7")'>Open album</button>`}function renderPrices(){return `<h2>Prijzen</h2>${Object.entries(PRICES).map(([cat,items])=>`<div class='card'><h3>${cat}</h3>${items.map(i=>`<div class='between line'><div><b>${i[0]}</b><br><span class='meta'>${i[1]} coins</span></div><span class='amount'>€ ${i[2]}</span></div>`).join('')}</div>`).join('')}<button class='btn secondary' onclick='openUrl(PRICEURL)'>Officiële prijslijst</button>`}
function weatherLabel(c){return {0:'zonnig',1:'helder',2:'licht bewolkt',3:'bewolkt',61:'regen',63:'regen',65:'veel regen',80:'buien',95:'onweer'}[c]||'weer'}async function updateWeather(){try{let r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=50.9530&longitude=4.7160&current=temperature_2m,weather_code&hourly=temperature_2m,precipitation_probability,precipitation,weather_code&forecast_days=3&timezone=Europe%2FBrussels'),d=await r.json(),t=Math.round(d.current.temperature_2m);weatherTag.innerHTML=t+'°C';weather48=(d.hourly.time||[]).map((time,i)=>({time,temp:Math.round(d.hourly.temperature_2m[i]),rain:d.hourly.precipitation_probability[i]??0,mm:d.hourly.precipitation[i]??0,code:d.hourly.weather_code[i]})).filter(x=>new Date(x.time)>=new Date()).slice(0,48);if(tab==='weather')render();}catch(e){weatherTag.innerHTML='--°C'}}function renderWeather(){return `<h2>Weer Rotselaar komende 48u</h2><p>Vaste locatie: Rotselaar.</p><div class='card'>${weather48.length?weather48.map(x=>`<div class='line'><b>${new Date(x.time).toLocaleString('nl-BE',{weekday:'short',hour:'2-digit',minute:'2-digit'})} · ${x.temp}°C</b><br><span class='meta'>${weatherLabel(x.code)} · regen ${x.rain}% · ${Number(x.mm).toFixed(1).replace('.',',')} mm</span></div>`).join(''):'<div class="empty">Weer laden...</div>'}</div>`}function renderSync(){return `<h2>Sync</h2><p>Realtime + fallback om de 2 seconden.</p><button class='btn primary' onclick='syncAll()'>Forceer sync</button>`}
function render(){renderNav();main.innerHTML=({lineup:renderLineup,now:renderNow,where:renderWhere,chat:renderChat,order:renderOrder,locker:renderLocker,card:renderCard,camp:renderCamp,map:renderMap,wk:renderWK,spotify:renderSpotify,photos:renderPhotos,prices:renderPrices,weather:renderWeather,sync:renderSync}[tab]||renderLineup)()}function init(){gateName.innerHTML='<option value="">Kies naam</option>'+PEOPLE.map(p=>`<option>${p}</option>`).join('');if(my)gate.style.display='none';setupRealtime();syncAll();render();updateWeather();setInterval(updateWeather,600000)}function saveName(){my=(gateCustom.value||gateName.value).trim();if(!my)return;localStorage.rwName=my;gate.style.display='none';render()}init();
</script></body></html>
