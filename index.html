@keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(-2%,2%) scale(1.06)}}
#app{max-width:560px;margin:auto;position:relative}
header{position:sticky;top:0;background:rgba(12,10,16,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--card-b);padding:12px 14px;z-index:5;display:flex;align-items:center;gap:12px}
.logo{width:48px;height:48px;border-radius:14px;border:2px solid var(--fire2);object-fit:cover;box-shadow:0 0 18px rgba(255,158,44,.5)}
header h1{font-size:19px;font-weight:800;letter-spacing:.3px;background:linear-gradient(90deg,var(--fire2),var(--fire3));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
header .amount{font-size:12px;color:var(--muted)}
main{padding:14px 12px 116px}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:560px;width:100%;display:flex;overflow:auto;background:rgba(12,10,16,.92);backdrop-filter:blur(10px);border-top:1px solid var(--card-b);padding:6px;gap:2px;z-index:10;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav button{min-width:74px;height:56px;border:0;border-radius:14px;background:transparent;color:#9a8f96;font-weight:600;font-size:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:.15s}
.nav button .ic{font-size:18px}
.nav button.active{background:linear-gradient(135deg,var(--fire1),var(--fire3));color:#fff;box-shadow:0 4px 14px rgba(255,46,107,.4)}
.card{background:linear-gradient(180deg,var(--card),var(--bg2));border:1px solid var(--card-b);border-radius:18px;padding:16px;margin:12px 0;box-shadow:0 6px 18px rgba(0,0,0,.25);transition:.2s}
.card h2{font-size:20px;background:linear-gradient(90deg,var(--fire2),var(--fire3));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;display:inline-block;margin-bottom:10px}
.card>h2:first-child{margin-top:0}
h2.page{font-size:22px;margin:4px 0 12px;background:linear-gradient(90deg,var(--fire2),var(--purple));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.line{border-bottom:1px solid var(--card-b);padding:10px 0}
.line:last-child{border:0}
.row,.between{display:flex;gap:8px;justify-content:space-between;align-items:center}
select,input{width:100%;font-size:16px;padding:12px;border-radius:12px;border:2px solid var(--fire2);background:#fff;color:#111}
.btn{border:0;border-radius:13px;padding:12px;font-weight:700;cursor:pointer;transition:.15s;font-size:14.5px}
.btn:active{transform:scale(.96)}
.primary{background:linear-gradient(135deg,var(--fire1),var(--fire3));color:#fff;box-shadow:0 4px 14px rgba(255,46,107,.35)}
.secondary{background:#2a2130;color:var(--text);border:1px solid var(--card-b)}
.danger{background:linear-gradient(135deg,#ff2e6b,#a3123f);color:#fff}
.ghost{background:transparent;color:var(--muted);border:1px dashed var(--card-b)}
.pill{border:1px solid var(--card-b);border-radius:999px;background:#241a29;color:#ddd;padding:9px 14px;margin-right:6px;font-weight:600;font-size:13px}
.pill.active{background:linear-gradient(135deg,var(--fire1),var(--fire3));color:#fff;border-color:transparent}
.pills{white-space:nowrap;overflow:auto;margin-bottom:4px}
.muted{color:var(--muted);font-size:13px}
.amount,.score{color:var(--gold);font-weight:800}
.badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:800;letter-spacing:.4px}
.badge.now{background:var(--fire3);color:#fff;animation:pulse 1.4s infinite}
.badge.soon{background:var(--gold);color:#1a1000}
.badge.live{background:var(--green);color:#052014;animation:pulse 1.4s infinite}
.badge.group{background:linear-gradient(135deg,var(--purple),#b06bff);color:#fff;display:inline-block;margin-top:5px;padding:5px 11px;box-shadow:0 3px 10px rgba(122,60,255,.4)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.weather{position:fixed;right:8px;top:70px;z-index:9;background:#fff;color:#111;border:2px solid var(--fire2);border-radius:999px;padding:7px 10px;font-weight:800;font-size:13px;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.gate{position:fixed;inset:0;background:radial-gradient(circle at 30% 20%,rgba(255,95,46,.25),transparent 50%),radial-gradient(circle at 80% 80%,rgba(122,60,255,.3),transparent 50%),var(--bg);z-index:99;display:flex;align-items:center;justify-content:center;padding:24px}
.gate .box{max-width:360px;width:100%;text-align:center}
.gate h1{font-size:30px;background:linear-gradient(90deg,var(--fire2),var(--fire3),var(--purple));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center;margin:6px 0}
.stat-grid .box{background:#241a29;border-radius:14px;padding:12px 6px}
.stat-grid .box b{display:block;font-size:22px;color:var(--gold)}
.stat-grid .box span{font-size:11px;color:var(--muted)}
.person-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--card-b)}
.person-row:last-child{border:0}
.chip{background:#241a29;border-radius:999px;padding:5px 10px;font-size:12px;margin:2px 3px 2px 0;display:inline-block}
.chip.on{background:linear-gradient(135deg,var(--fire1),var(--fire3));color:#fff}
.qty{min-width:26px;text-align:center;font-weight:800;font-size:16px}
.drink-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--card-b)}
.drink-row:last-child{border:0}
.drink-row .info{flex:1}
.drink-row .ctrl{display:flex;align-items:center;gap:8px}
.round-btn{width:38px;height:38px;border-radius:11px;border:0;font-weight:800;font-size:18px}
.cat-title{font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin:14px 0 4px}
.cat-title:first-child{margin-top:0}
</style></head>

async function syncAll(){

      sb.from('pint_entries').select('*').order('created_at',{ascending:true}),

function sid(d,st,t,a){return (d+st+t+a).toLowerCase().replace(/[^a-z0-9]+/g,'-')}
function fav(i){return live.favorites.some(f=>f.user_name===my && f.artist_id===i)}
async function toggleFav(i){
  if(fav(i)) await sb.from('favorites').delete().eq('user_name',my).eq('artist_id',i);
  else await sb.from('favorites').insert({user_name:my,artist_id:i});
  syncAll();
}
function dt(d,t){
  let [h,m] = t.split('-')[0].split(':').map(Number);
  let x = new Date(dates[d]+'T00:00:00+02:00');
  if(h<6) x.setDate(x.getDate()+1);
  x.setHours(h,m,0,0);
  return x;
}
function stat(d,r){
  let [a,b] = r.split('-'), n = new Date(), s = dt(d,a), e = dt(d,b);
  if(n>=s && n<=e) return 'now';
  if(s-n>0 && s-n<=1800000) return 'soon';
  return 'later';
}

}
function favNames(id){

function favTag(id){
  let names = favNames(id);
  if(!names.length) return '';

  return `<br><span class="chip on">★ ${names.map(n=>esc(n)).join(', ')}</span>`;
}
function slotRows(rows,stage,d){

  }).join('');
}

let wkLiveCache = [], wkLiveLoading = false;
async function fetchWKLive(){
  try{
    let res = await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?limit=200&dates=20260620-20260710');
    let data = await res.json();
    return (data.events||[]).map(ev=>{
      let comp = ev.competitions?.[0];
      let home = comp?.competitors?.find(c=>c.homeAway==='home');
      let away = comp?.competitors?.find(c=>c.homeAway==='away');
      let round = comp?.notes?.[0]?.headline || ev.season?.slug || ev.shortName || '';
      let st = comp?.status?.type || {};
      return {
        home: home?.team?.displayName || home?.team?.name || '?',
        away: away?.team?.displayName || away?.team?.name || '?',
        homeScore: home?.score, awayScore: away?.score,
        state: st.state, detail: st.shortDetail || st.detail || '',
        clock: comp?.status?.displayClock, round,
        date: ev.date
      };
    }).filter(m => /round of 32|round of 16|1\/16|1\/8/i.test(m.round));
  }catch(e){console.log('WK live fout', e); return null}
}
function wkBadge(m){
  if(m.state==='in') return `<span class="badge live">LIVE ${m.clock||''}</span>`;
  if(m.state==='post') return `<span class="badge" style="background:#3a2a3a;color:#ccc">AFGELOPEN</span>`;
  return `<span class="badge soon">${m.date?new Date(m.date).toLocaleString('nl-BE',{weekday:'short',hour:'2-digit',minute:'2-digit'}):''}</span>`;
}
async function renderWK(){
  if(!wkLiveLoading){
    wkLiveLoading = true;
    fetchWKLive().then(r=>{if(r){wkLiveCache=r} wkLiveLoading=false; if(tab==='wk') render();});
  }
  let live32 = wkLiveCache.filter(m=>/round of 32|1\/16/i.test(m.round));
  let live16 = wkLiveCache.filter(m=>/round of 16|1\/8/i.test(m.round));
  let liveBlock = wkLiveCache.length ? `
    <div class='card'><h3>🔴 Live via ESPN</h3>
    ${[...live32,...live16].map(m=>`<div class='line'><div class='between'><div><b>${esc(m.home)}</b><br><b>${esc(m.away)}</b><br>${wkBadge(m)}</div><span class='score'>${m.homeScore??'-'} - ${m.awayScore??'-'}</span></div></div>`).join('')}
    </div>` : `<div class='card'><p class="muted">Live scores worden opgehaald via ESPN (geen API-key nodig)... als er hier niets verschijnt heeft je toestel geen internet of blokkeert het de aanvraag.</p></div>`;
  return `<h2 class="page">⚽ WK</h2><p class="muted">1/16 (Round of 32) en 1/8 finales (Round of 16). Ververst elke 30 sec.</p>
  ${liveBlock}
  <div class='card'><h3>Vaste kalender &amp; doelpuntenmakers</h3>${WK.map(m=>`<div class='line'><div class='between'><div><b>${m[2]}</b><br><b>${m[3]}</b><br><span class='muted'>${m[0]} · ${m[1]} · ${m[6]==='1/16'?'1/16 finale':'1/8 finale'}</span>${m[5]?'<br><span class="amount">⚽ '+esc(m[5])+'</span>':''}</div><span class='score'>${m[4]||'-'}</span></div></div>`).join('')}</div>`;
}

function renderPrices(){
  return `<h2 class="page">💰 Prijzen</h2><p class='muted'>Volledige prijslijst uit Rock Werchter, met link naar de officiële pagina.</p><button class='btn secondary' style="width:100%" onclick='openUrl("https://www.rockwerchter.be/en/price-list")'>Officiële prijslijst</button>${Object.entries(PRICES).map(([cat,items])=>`<div class='card'><h3>${cat}</h3>${items.map(i=>`<div class='between line'><div><b>${i[0]}</b><br><span class='muted'>${i[1]} coins</span></div><span class='amount'>€ ${i[2]}</span></div>`).join('')}</div>`).join('')}`;
}
function icon(c){
  if([0,1].includes(c)) return '☀️';
  if([2,3].includes(c)) return '☁️';
  if([61,63,65,80].includes(c)) return '🌧️';
  if(c>=95) return '⛈️';
  return '🌤️';
}
async function updateWeather(){
  try{
    let r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=50.9530&longitude=4.7160&current=temperature_2m,weather_code&hourly=temperature_2m,precipitation_probability,weather_code&forecast_days=3&timezone=Europe%2FBrussels');
    let d = await r.json();
    let t = Math.round(d.current.temperature_2m);
    weatherTag.innerHTML = icon(d.current.weather_code)+' '+t+'°C';
    weather48 = (d.hourly.time||[]).map((time,i)=>({time, temp:Math.round(d.hourly.temperature_2m[i]), rain:d.hourly.precipitation_probability[i]??0, code:d.hourly.weather_code[i]})).filter(x=>new Date(x.time)>=new Date()).slice(0,48);
    if(tab==='weather') render();
  }catch(e){weatherTag.innerHTML='--°C'}
}
function renderWeather(){
  return `<h2 class="page">☀️ Weer Rotselaar</h2><div class='card'>${weather48.map(x=>`<div class='line' style='display:grid;grid-template-columns:92px 70px 1fr;gap:10px;align-items:center'><b>${new Date(x.time).toLocaleString('nl-BE',{weekday:'short',hour:'2-digit',minute:'2-digit'})}</b><span class='amount'>${x.temp}°C</span><span>${icon(x.code)} regen ${x.rain}%</span></div>`).join('') || '<span class="muted">Laden...</span>'}</div>`;
}
function renderSync(){
  return `<h2 class="page">🔄 Sync</h2><button class='btn primary' style="width:100%" onclick='syncAll()'>Forceer sync</button>`;
}

function render(){
  nav();
  let fn = ({lineup:renderLineup, now:renderNow, where:renderWhere, chat:renderChat, order:renderOrder, card:renderCard, locker:renderLocker, camp:renderCamp, sixpack:renderSixpack, costs:renderCosts, map:renderMap, photos:renderPhotos, wk:renderWK, prices:renderPrices, weather:renderWeather, sync:renderSync}[tab] || renderLineup)();
  if(fn && fn.then) fn.then(x=>main.innerHTML=x);
  else main.innerHTML = fn;
}
function init(){
  gateName.innerHTML = '<option value="">Kies naam</option>' + PEOPLE.map(p=>`<option>${p}</option>`).join('');
  if(my) gate.style.display = 'none';
  setupRealtime();
  syncAll();
  render();
  updateWeather();
  setInterval(updateWeather, 600000);
  setInterval(()=>{if(tab==='wk') render()}, 30000);
}
function saveName(){
  my = (gateCustom.value || gateName.value).trim();
  if(!my) return;
  localStorage.rwName = my;
  gate.style.display = 'none';
  render();
}
init();
</script></body></html>
